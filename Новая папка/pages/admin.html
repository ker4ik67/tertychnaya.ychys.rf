<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Панель администратора — Учусь.РФ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo"><i class="fas fa-graduation-cap"></i> Учусь.РФ</div>
        <button class="burger" id="burgerBtn"><i class="fas fa-bars"></i></button>
        <div class="nav-links" id="navLinks">
            <a href="/index.html"><i class="fas fa-home"></i> Главная</a>
            <a href="./register.html"><i class="fas fa-user-plus"></i> Регистрация</a>
            <a href="./login.html"><i class="fas fa-sign-in-alt"></i> Вход</a>
            <a href="./profile.html"><i class="fas fa-user"></i> Личный кабинет</a>
            <a href="./application.html"><i class="fas fa-file-signature"></i> Заявка</a>
            <a href="./admin.html" class="active"><i class="fas fa-shield-alt"></i> Админ</a>
        </div>
    </nav>

    <div class="container">
        <div class="card fade-in" style="margin-top: 16px;">
            <div class="flex-between">
                <h2 class="card-title" style="margin-bottom: 0;"><i class="fas fa-shield-alt" style="color: var(--primary);"></i> Панель администратора</h2>
                <button class="btn btn-danger btn-sm" id="adminLogout"><i class="fas fa-sign-out-alt"></i> Выйти</button>
            </div>
            <p style="color: #6c757d; font-size: 14px;">Управление заявками</p>
        </div>

        <!-- Фильтры и сортировка -->
        <div class="card fade-in">
            <div style="display: flex; flex-wrap: wrap; gap: 12px; align-items: center;">
                <div style="flex: 1; min-width: 140px;">
                    <label style="font-size: 13px; font-weight: 600;">Фильтр по статусу</label>
                    <select class="form-control" id="filterStatus" style="padding: 8px 12px; font-size: 14px;">
                        <option value="all">Все</option>
                        <option value="Новая">Новая</option>
                        <option value="Идет обучение">Идет обучение</option>
                        <option value="Обучение завершено">Обучение завершено</option>
                    </select>
                </div>
                <div style="flex: 1; min-width: 140px;">
                    <label style="font-size: 13px; font-weight: 600;">Сортировка</label>
                    <select class="form-control" id="sortBy" style="padding: 8px 12px; font-size: 14px;">
                        <option value="newest">Сначала новые</option>
                        <option value="oldest">Сначала старые</option>
                    </select>
                </div>
                <div style="margin-top: 18px;">
                    <button class="btn btn-sm" id="applyFilters"><i class="fas fa-sync"></i> Применить</button>
                </div>
            </div>
        </div>

        <!-- Список заявок -->
        <div class="card fade-in">
            <h3 class="card-title" style="font-size: 18px;">Все заявки</h3>
            <div id="adminAppsContainer">
                <p class="text-muted">Загрузка...</p>
            </div>

            <!-- Пагинация -->
            <div style="display: flex; justify-content: center; gap: 8px; margin-top: 20px; flex-wrap: wrap;" id="pagination"></div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        // Проверка прав администратора
        const admin = checkAdmin();
        if (!admin) {
            window.location.href = 'login.html';
        }

        let currentPage = 1;
        const perPage = 5;
        let allApps = [];

        function renderApplications(page = 1) {
            const filter = document.getElementById('filterStatus').value;
            const sort = document.getElementById('sortBy').value;

            let filtered = allApps;

            if (filter !== 'all') {
                filtered = filtered.filter(a => a.status === filter);
            }

            // Сортировка
            filtered.sort((a, b) => {
                const dateA = new Date(a.createdAt);
                const dateB = new Date(b.createdAt);
                return sort === 'newest' ? dateB - dateA : dateA - dateB;
            });

            const total = filtered.length;
            const totalPages = Math.ceil(total / perPage) || 1;
            if (page > totalPages) page = totalPages;
            if (page < 1) page = 1;
            currentPage = page;

            const start = (page - 1) * perPage;
            const end = Math.min(start + perPage, total);
            const pageItems = filtered.slice(start, end);

            const container = document.getElementById('adminAppsContainer');

            if (pageItems.length === 0) {
                container.innerHTML = `<p class="text-muted">Заявок не найдено</p>`;
            } else {
                let html = `<div style="overflow-x: auto;"><table>
                    <thead><tr>
                        <th>Пользователь</th>
                        <th>Курс</th>
                        <th>Дата</th>
                        <th>Оплата</th>
                        <th>Статус</th>
                        <th>Действие</th>
                    </tr></thead><tbody>`;

                pageItems.forEach(app => {
                    const user = DB.findUserById(app.userId);
                    const userName = user ? user.fullName : 'Неизвестный';
                    html += `
                        <tr>
                            <td>${userName}</td>
                            <td><strong>${app.course}</strong></td>
                            <td>${formatDate(app.startDate)}</td>
                            <td>${app.payment}</td>
                            <td><span class="badge ${getStatusBadge(app.status)}">${app.status}</span></td>
                            <td>
                                <select class="form-control status-select" data-appid="${app.id}" style="padding: 4px 28px 4px 10px; font-size: 13px; width: auto; min-width: 130px;">
                                    <option value="Новая" ${app.status === 'Новая' ? 'selected' : ''}>Новая</option>
                                    <option value="Идет обучение" ${app.status === 'Идет обучение' ? 'selected' : ''}>Идет обучение</option>
                                    <option value="Обучение завершено" ${app.status === 'Обучение завершено' ? 'selected' : ''}>Обучение завершено</option>
                                </select>
                            </td>
                        </tr>
                    `;
                });

                html += `</tbody></table></div>`;
                container.innerHTML = html;

                // Обработчики изменения статуса
                document.querySelectorAll('.status-select').forEach(select => {
                    select.addEventListener('change', function() {
                        const appId = this.dataset.appid;
                        const newStatus = this.value;
                        DB.updateApplication(appId, { status: newStatus });
                        showToast(`Статус заявки изменён на «${newStatus}»`, 'success');
                        loadAllApps();
                    });
                });
            }

            // Пагинация
            const pagContainer = document.getElementById('pagination');
            let pagHtml = '';
            for (let i = 1; i <= totalPages; i++) {
                pagHtml += `<button class="btn btn-sm ${i === currentPage ? 'btn' : 'btn-outline'}" data-page="${i}">${i}</button>`;
            }
            pagContainer.innerHTML = pagHtml;

            pagContainer.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', function() {
                    renderApplications(parseInt(this.dataset.page));
                });
            });
        }

        function loadAllApps() {
            allApps = DB.getApplications();
            renderApplications(currentPage);
        }

        loadAllApps();

        // Фильтры и сортировка
        document.getElementById('applyFilters').addEventListener('click', function() {
            renderApplications(1);
        });

        // Выход
        document.getElementById('adminLogout').addEventListener('click', function() {
            DB.logout();
            showToast('Вы вышли из системы', 'info');
            setTimeout(() => window.location.href = 'index.html', 400);
        });
    </script>
</body>
</html>
