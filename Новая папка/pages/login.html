<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Вход — Учусь.РФ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo"><i class="fas fa-graduation-cap"></i> Учусь.РФ</div>
        <button class="burger" id="burgerBtn"><i class="fas fa-bars"></i></button>
        <div class="nav-links" id="navLinks">
            <a href="index.html"><i class="fas fa-home"></i> Главная</a>
            <a href="register.html"><i class="fas fa-user-plus"></i> Регистрация</a>
            <a href="login.html" class="active"><i class="fas fa-sign-in-alt"></i> Вход</a>
            <a href="profile.html"><i class="fas fa-user"></i> Личный кабинет</a>
            <a href="application.html"><i class="fas fa-file-signature"></i> Заявка</a>
            <a href="admin.html"><i class="fas fa-shield-alt"></i> Админ</a>
        </div>
    </nav>

    <div class="container" style="max-width: 440px;">
        <div class="card fade-in" style="margin-top: 40px;">
            <h1 class="card-title" style="text-align: center;">Вход</h1>
            <form id="loginForm">
                <div class="form-group">
                    <label>Логин</label>
                    <input type="text" class="form-control" id="loginLogin" placeholder="Введите логин" required>
                    <span class="error-text" id="loginLoginError"></span>
                </div>

                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" class="form-control" id="loginPassword" placeholder="Введите пароль" required>
                    <span class="error-text" id="loginPasswordError"></span>
                </div>

                <button type="submit" class="btn btn-block">Войти</button>
            </form>

            <div style="text-align: center; margin-top: 18px;">
                <span>Еще не зарегистрированы? </span>
                <a href="register.html" style="color: var(--primary); font-weight: 600;">Регистрация</a>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const login = document.getElementById('loginLogin').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const loginError = document.getElementById('loginLoginError');
            const passError = document.getElementById('loginPasswordError');

            loginError.textContent = '';
            passError.textContent = '';
            document.getElementById('loginLogin').classList.remove('error');
            document.getElementById('loginPassword').classList.remove('error');

            const user = DB.findUserByLogin(login);

            if (!user) {
                loginError.textContent = 'Пользователь с таким логином не найден';
                document.getElementById('loginLogin').classList.add('error');
                return;
            }

            if (user.password !== password) {
                passError.textContent = 'Неверный пароль';
                document.getElementById('loginPassword').classList.add('error');
                return;
            }

            DB.setCurrentUser(user);
            showToast('Добро пожаловать, ' + user.fullName + '!', 'success');

            if (user.role === 'admin') {
                setTimeout(() => window.location.href = 'admin.html', 500);
            } else {
                setTimeout(() => window.location.href = 'profile.html', 500);
            }
        });
    </script>
</body>
</html>
