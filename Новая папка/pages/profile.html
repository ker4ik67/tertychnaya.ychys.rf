<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Личный кабинет — Учусь.РФ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo"><i class="fas fa-graduation-cap"></i> Учусь.РФ</div>
        <button class="burger" id="burgerBtn"><i class="fas fa-bars"></i></button>
        <div class="nav-links" id="navLinks">
            <a href="index.html"><i class="fas fa-home"></i> Главная</a>
            <a href="register.html"><i class="fas fa-user-plus"></i> Регистрация</a>
            <a href="login.html"><i class="fas fa-sign-in-alt"></i> Вход</a>
            <a href="profile.html" class="active"><i class="fas fa-user"></i> Личный кабинет</a>
            <a href="application.html"><i class="fas fa-file-signature"></i> Заявка</a>
            <a href="admin.html"><i class="fas fa-shield-alt"></i> Админ</a>
        </div>
    </nav>

    <div class="container">
        <div class="card fade-in" style="margin-top: 16px;">
            <div class="flex-between">
                <h2 class="card-title" style="margin-bottom: 0;"><i class="fas fa-user-circle"></i> Личный кабинет</h2>
                <button class="btn btn-danger btn-sm" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
            </div>
            <div id="userInfo" style="margin-top: 12px; font-size: 15px;"></div>
        </div>

        <!-- Слайдер -->
        <section class="slider-section">
            <div class="slider-wrapper">
                <div class="slides">
                    <div class="slide slide-1"><span>Повышение квалификации</span></div>
                    <div class="slide slide-2"><span>Переподготовка</span></div>
                    <div class="slide slide-3"><span>Охрана труда</span></div>
                    <div class="slide slide-4"><span>Учись с нами!</span></div>
                </div>
                <button class="slider-btn prev"><i class="fas fa-chevron-left"></i></button>
                <button class="slider-btn next"><i class="fas fa-chevron-right"></i></button>
                <div class="slider-dots"></div>
            </div>
        </section>

        <!-- Мои заявки -->
        <div class="card fade-in">
            <h2 class="card-title"><i class="fas fa-clipboard-list"></i> Мои заявки</h2>
            <div id="applicationsList">
                <p class="text-muted">Загрузка...</p>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        const user = checkAuth();
        if (!user) {
            window.location.href = 'login.html';
        }

        document.getElementById('userInfo').innerHTML = `
            <p><strong>${user.fullName}</strong> (${user.login})</p>
            <p style="color: #6c757d; font-size: 14px;">${user.email} | ${user.phone}</p>
        `;

        function loadApplications() {
            const apps = DB.getApplicationsByUser(user.id);
            const container = document.getElementById('applicationsList');

            if (apps.length === 0) {
                container.innerHTML = `<p class="text-muted">У вас пока нет заявок. <a href="application.html" style="color: var(--primary);">Создать заявку</a></p>`;
                return;
            }

            let html = `<div style="overflow-x: auto;"><table>
                <thead><tr>
                    <th>Курс</th>
                    <th>Дата начала</th>
                    <th>Оплата</th>
                    <th>Статус</th>
                    <th>Отзыв</th>
                </tr></thead><tbody>`;

            apps.forEach(app => {
                const canReview = app.status === 'Обучение завершено';
                html += `
                    <tr>
                        <td><strong>${app.course}</strong></td>
                        <td>${formatDate(app.startDate)}</td>
                        <td>${app.payment}</td>
                        <td><span class="badge ${getStatusBadge(app.status)}">${app.status}</span></td>
                        <td>
                            ${canReview ? `
                                <button class="btn btn-sm btn-outline review-btn" data-appid="${app.id}">
                                    <i class="fas fa-star"></i> Отзыв
                                </button>
                            ` : `<span class="text-muted">—</span>`}
                        </td>
                    </tr>
                `;
            });

            html += `</tbody></table></div>`;
            container.innerHTML = html;

            document.querySelectorAll('.review-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const appId = this.dataset.appid;
                    const app = DB.getApplicationById(appId);
                    if (!app) return;

                    const review = prompt('Оставьте отзыв о курсе "' + app.course + '":');
                    if (review !== null && review.trim() !== '') {
                        DB.updateApplication(appId, { review: review.trim() });
                        showToast('Спасибо за отзыв!', 'success');
                        loadApplications();
                    }
                });
            });
        }

        loadApplications();

        // Выход → на главную
        document.getElementById('logoutBtn').addEventListener('click', function() {
            DB.logout();
            showToast('Вы вышли из системы', 'info');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 400);
        });

        setTimeout(initSlider, 100);
    </script>
</body>
</html>
